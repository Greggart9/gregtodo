<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8ca90"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#e8ca90"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0a14"/>
  <!-- Glow -->
  <circle cx="16" cy="16" r="12" fill="rgba(201,169,110,0.12)"/>
  <!-- Gold circle -->
  <circle cx="16" cy="16" r="10" fill="url(#glow)"/>
  <!-- Checkmark -->
  <polyline points="9.5,16 13.5,20.5 22.5,11" fill="none" stroke="#0a0a14" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Accent dot -->
  <circle cx="23" cy="9" r="2" fill="#f0d898"/>
</svg>
